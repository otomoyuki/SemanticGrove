<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>解説付き学習モード - プログラミング基礎 | SemanticGrove</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <!-- ツールバー -->
  <header class="toolbar">   
    <nav class="toolbar-buttons">
      <!-- ログイン済みユーザー情報（最初は非表示） -->
      <span class="user-info" id="userInfo" style="display: none;">
        <span id="userName"></span>さん
        <span class="sg-display">💎 <span id="sgBalance">0</span> SG</span>
      </span>
      
      <a href="/" class="toolbar-button">ホーム</a>
      <a href="/main" class="toolbar-button">メイン</a>
      <a href="/readme" class="toolbar-button">README</a>
      <a href="/learn" class="toolbar-button active">学習モード</a>
      <a href="/practice/low" class="toolbar-button">初級モード</a>
      <a href="/practice/middle" class="toolbar-button">中級モード</a>
      <a href="/practice/high" class="toolbar-button">上級モード</a>
      <a href="/games" class="toolbar-button game-button">Play Field</a>
      <a href="/feedback" class="toolbar-button">ご意見</a>
      
      <!-- 認証ボタン -->
      <a href="/login" class="toolbar-button" id="loginBtn">🔐 ログイン</a>
      <a href="/register" class="toolbar-button" id="registerBtn">✨ 新規登録</a>
      <a href="#" class="toolbar-button logout-button" id="logoutBtn" style="display: none;">ログアウト</a>
    </nav>
  </header>

  <script>
  // ログイン状態確認
  document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('access_token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (token && user.username) {
      // ログイン済み
      document.getElementById('userInfo').style.display = 'inline';
      document.getElementById('userName').textContent = user.username;
      document.getElementById('sgBalance').textContent = user.sg_points || 0;
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('registerBtn').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'inline-block';
    }
    
    // ログアウト
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.clear();
      window.location.href = '/login?logout=success';
    });
  });
  </script>
  
  <div class="main-content">
    <h1 class="logo-title">SemanticGrove</h1>
    <h1>学習モード</h1>
    
    <!-- 言語選択 -->
    <div class="language-select">
      <label for="language">　　言語を選択：</label>
      <select id="language" onchange="startLearning()">
        <option value="Python">Python</option>
        <option value="PHP">PHP</option>
        <option value="C#">C#</option>
        <option value="Java">Java</option>
        <option value="JavaScript">JavaScript</option>
        <option value="CSS">CSS</option>
        <option value="Go">Go</option>
        <option value="HTML">HTML</option>
        <option value="Kotlin">Kotlin</option>
        <option value="React">React</option>
        <option value="Ruby">Ruby</option>
        <option value="Rust">Rust</option>
        <option value="Swift">Swift</option>
        <option value="TypeScript">TypeScript</option>
        <option value="COBOL">COBOL</option>
        <option value="VBA">VBA</option>
        <option value="IQ">IQ問題</option>
      </select>
    </div>
  
    <!-- 学習エリア -->
    <div class="learning-box">
      <p>言語を選択すると問題が表示されます</p>
    </div>
    
    <div class="next-button-area">
      <button onclick="goNext()">次へ</button>
    </div>
  </div>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <script src="{{ url_for('static', filename='sg-balance.js') }}"></script>

</body>
</html>
