<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - SemanticGrove</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
    <style>
        /* 基本スタイル（auth.cssがない場合） */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
        }
        .login-container {
            max-width: 450px;
            width: 90%;
            margin: 20px auto;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .login-header h2 {
            font-size: 1.8rem;
            color: #667eea;
            margin: 10px 0;
        }
        .login-header p {
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-input-wrapper input {
            padding-right: 45px;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-button {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }
        .forgot-password a {
            color: #999;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- ヘッダー -->
        <div class="login-header">
            <a href="/" class="back-button">← トップページに戻る</a>
            <h1>🌿 SemanticField</h1>
            <h2>ログイン</h2>
            <p>おかえりなさい</p>
        </div>
        </div>

        <!-- ⚠️ 試験運用中の警告 -->
        <div style="background: #fff3cd; border: 2px solid #ffc107; border-radius: 8px; padding: 15px; margin: 20px 0; color: #856404;">
            <h4 style="margin: 0 0 10px 0; font-size: 1rem;">⚠️ 試験運用中の注意事項</h4>
            <p style="margin: 0 0 10px 0; font-size: 0.9rem; line-height: 1.5;">
                現在このアプリは試験運用中です。予告なくユーザーデータが消失する可能性があります。
            </p>
            <p style="margin: 10px 0 0 0; padding-top: 10px; border-top: 1px solid #e0a800; font-size: 0.85rem; line-height: 1.5;">
                多くの方にご参加いただけるようになりましたら、より安定したサーバー環境へ移行し、皆様のデータをしっかりお守りできるよう努めてまいります。
            </p>
        </div>

        <!-- ログインフォーム -->
        <form id="loginForm" class="login-form">
            <!-- ユーザー名 -->
            <div class="form-group">
                <label for="username">
                    <span class="label-icon">👤</span>
                    ユーザー名
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required
                    placeholder="ユーザー名を入力"
                    autocomplete="username"
                >
            </div>

            <!-- パスワード -->
            <div class="form-group">
                <label for="password">
                    <span class="label-icon">🔒</span>
                    パスワード
                </label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        required
                        placeholder="パスワードを入力"
                        autocomplete="current-password"
                    >
                    <button type="button" class="toggle-password" id="togglePassword">
                        👁️
                    </button>
                </div>
            </div>

            <!-- メッセージ -->
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <!-- ログインボタン -->
            <button type="submit" id="submitBtn" class="submit-btn">
                🔐 ログイン
            </button>

            <!-- パスワード忘れ -->
            <div class="forgot-password">
                <a href="/forgot-password">パスワードをお忘れですか？</a>
            </div>

            <!-- 新規登録リンク -->
            <div class="register-link">
                <p>アカウントをお持ちでない方は</p>
                <a href="/register">新規登録はこちら</a>
            </div>
        </form>

        <!-- フッター -->
        <div class="login-footer">
            <p>&copy; 2025 SemanticField. All rights reserved.</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
