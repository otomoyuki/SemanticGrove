
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン - SemanticGrove</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .login-main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }

    .login-card-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .login-card-header .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 2rem;
      color: #4a7c59;
      margin-bottom: 6px;
    }

    .login-card-header h2 {
      font-size: 1.4rem;
      color: #333;
      margin: 0 0 4px 0;
    }

    .login-card-header p {
      color: #888;
      font-size: 0.9rem;
      margin: 0;
    }

    .warning-box {
      background: #fff8e1;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 24px;
      font-size: 0.82rem;
      color: #795548;
      line-height: 1.5;
    }

    .warning-box strong {
      display: block;
      margin-bottom: 4px;
      color: #5d4037;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
      color: #333;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4a7c59;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 44px;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
    }

    .error-message {
      background: #ffeaea;
      color: #c33;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message {
      background: #eafaf1;
      color: #2e7d52;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      display: none;
    }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #4a7c59 0%, #5a9a6e 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      margin-top: 4px;
    }

    .submit-btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-links {
      text-align: center;
      margin-top: 20px;
      font-size: 0.88rem;
      color: #888;
    }

    .login-links a {
      color: #4a7c59;
      text-decoration: none;
      font-weight: 600;
    }

    .login-links a:hover {
      text-decoration: underline;
    }

    .login-links .divider {
      margin: 8px 0;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: #aaa;
      text-decoration: none;
    }

    .back-link:hover {
      color: #4a7c59;
    }

    /* スマホ対応 */
    @media (max-width: 768px) {
      .login-main {
        padding: 20px 12px;
        /* サイドバー分のmarginをリセット */
        margin-left: 0 !important;
      }

      .login-card {
        padding: 28px 20px;
      }

      .login-card-header .logo {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <!-- 左サイドバー（main.htmlと同じ構造） -->
  <header class="toolbar">
    <nav class="toolbar-buttons">
      <a href="/" class="toolbar-button">ホーム</a>
      <a href="/main" class="toolbar-button">メイン</a>
      <a href="/readme" class="toolbar-button">README</a>
      <a href="/learn" class="toolbar-button">学習モード</a>
      <a href="/practice/low" class="toolbar-button">初級モード</a>
      <a href="/practice/middle" class="toolbar-button">中級モード</a>
      <a href="/practice/high" class="toolbar-button">上級モード</a>
      <a href="/games" class="toolbar-button game-button">🎮ゲーム</a>
      <a href="/feedback" class="toolbar-button">ご意見</a>
      <a href="/login" class="toolbar-button active">🔐 ログイン</a>
      <a href="/register" class="toolbar-button">✨ 新規登録</a>
    </nav>
  </header>

  <!-- メインコンテンツ -->
  <div class="login-main">
    <div class="login-card">

      <!-- ヘッダー -->
      <div class="login-card-header">
        <div class="logo">🌿 SemanticField</div>
        <h2>ログイン</h2>
        <p>おかえりなさい</p>
      </div>

      <!-- 試験運用中の警告 -->
      <div class="warning-box">
        <strong>⚠️ 試験運用中の注意事項</strong>
        現在このアプリは試験運用中です。予告なくユーザーデータが消失する可能性があります。より安定したサーバー環境への移行後、データをしっかりお守りできるよう努めてまいります。
      </div>

      <!-- メッセージ -->
      <div id="successMessage" class="success-message"></div>
      <div id="errorMessage" class="error-message"></div>

      <!-- ログインフォーム -->
      <form id="loginForm">
        <div class="form-group">
          <label for="username">👤 ユーザー名</label>
          <input
            type="text"
            id="username"
            name="username"
            required
            placeholder="ユーザー名を入力"
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label for="password">🔒 パスワード</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              required
              placeholder="パスワードを入力"
              autocomplete="current-password"
            >
            <button type="button" class="toggle-password" id="togglePassword">👁️</button>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">🔐 ログイン</button>
      </form>

      <!-- リンク -->
      <div class="login-links">
        <div class="divider">
          <a href="/forgot-password">パスワードをお忘れですか？</a>
        </div>
        <div class="divider">
          アカウントをお持ちでない方は <a href="/register">新規登録はこちら</a>
        </div>
      </div>

      <a href="/" class="back-link">← トップページに戻る</a>

    </div>
  </div>

  <script src="{{ url_for('static', filename='login.js') }}"></script>
</body>
</html>
