<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SemanticGrove - README</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .readme-container {
      background-color: #465;
      color: #f0f0f0;
      padding: 40px;
      margin: 20px auto;
      width: 90%;
      max-width: 1000px;
      border-radius: 15px;
      text-align: left;
      line-height: 1.8;
    }
    .readme-container h1 {
      color: #8fa;
      border-bottom: 3px solid #8fa;
      padding-bottom: 10px;
      margin-top: 30px;
    }
    .readme-container h2 {
      color: #acd;
      border-bottom: 2px solid #acd;
      padding-bottom: 8px;
      margin-top: 30px;
    }
    .readme-container h3 {
      color: #8fa;
      margin-top: 20px;
    }
    .readme-container h4 {
      color: #9bd;
      margin-top: 15px;
    }
    .readme-container p {
      margin: 12px 0;
      color: #f0f0f0;
    }
    .readme-container strong {
      color: #4f4;
      font-weight: bold;
    }
    .readme-container table {
      width: 100%;
      border-collapse: collapse;
      margin: 15px 0;
      background-color: rgba(0,0,0,0.2);
    }
    .readme-container table th,
    .readme-container table td {
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      text-align: left;
    }
    .readme-container table th {
      background-color: #558877;
      font-weight: bold;
    }
    .readme-container code {
      background-color: #354;
      padding: 2px 6px;
      border-radius: 4px;
      color: #4f4;
      font-family: 'Courier New', monospace;
      font-size: 0.95em;
    }
    .readme-container pre {
      background-color: #354;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      border-left: 4px solid #8fa;
      margin: 15px 0;
    }
    .readme-container pre code {
      background-color: transparent;
      padding: 0;
      color: #f0f0f0;
    }
    .readme-container ul, .readme-container ol {
      margin-left: 25px;
      margin-bottom: 15px;
    }
    .readme-container li {
      margin: 8px 0;
    }
    .readme-container a {
      color: #4f4;
      text-decoration: underline;
    }
    .readme-container a:hover {
      color: #8fa;
    }
    .readme-container hr {
      border: none;
      border-top: 2px solid rgba(255,255,255,0.3);
      margin: 30px 0;
    }
    .readme-container blockquote {
      border-left: 4px solid #8fa;
      padding-left: 20px;
      margin: 20px 0;
      font-style: italic;
      color: #ddd;
    }
    /* バッジ画像 */
    .readme-container img {
      max-width: 100%;
      height: auto;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <!-- ツールバー -->
  <header class="toolbar">   
    <nav class="toolbar-buttons">
      <!-- ログイン済みユーザー情報（最初は非表示） -->
      <span class="user-info" id="userInfo" style="display: none;">
        <span id="userName"></span>さん
        <span class="sg-display">💎 <span id="sgBalance">0</span> SG</span>
      </span>
      
      <a href="/" class="toolbar-button">ホーム</a>
      <a href="/main" class="toolbar-button">メイン</a>
      <a href="/readme" class="toolbar-button active">README</a>
      <a href="/learn" class="toolbar-button">学習モード</a>
      <a href="/practice/low" class="toolbar-button">初級モード</a>
      <a href="/practice/middle" class="toolbar-button">中級モード</a>
      <a href="/practice/high" class="toolbar-button">上級モード</a>
      <a href="/games" class="toolbar-button game-button">🎮ゲーム</a>
      <a href="/feedback" class="toolbar-button">ご意見</a>
      
      <!-- 認証ボタン -->
      <a href="/login" class="toolbar-button" id="loginBtn">🔐 ログイン</a>
      <a href="/register" class="toolbar-button" id="registerBtn">✨ 新規登録</a>
      <a href="#" class="toolbar-button logout-button" id="logoutBtn" style="display: none;">ログアウト</a>
    </nav>
  </header>

  <script>
  // ログイン状態確認
  document.addEventListener('DOMContentLoaded', function() {
    const token = localStorage.getItem('access_token');
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    
    if (token && user.username) {
      // ログイン済み
      document.getElementById('userInfo').style.display = 'inline';
      document.getElementById('userName').textContent = user.username;
      document.getElementById('sgBalance').textContent = user.sg_points || 0;
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('registerBtn').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'inline-block';
    }
    
    // ログアウト
    document.getElementById('logoutBtn').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.clear();
      window.location.href = '/login?logout=success';
    });
  });
  </script>

  <div class="main-content">
    <h1 class="logo-title">SemanticGrove</h1>
    
    <div class="readme-container">
      {{ readme_html|safe }}
    </div>
  </div>
  <script src="{{ url_for('static', filename='sg-balance.js') }}"></script>
</body>
</html>
